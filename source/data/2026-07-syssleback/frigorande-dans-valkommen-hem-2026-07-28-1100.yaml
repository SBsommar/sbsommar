    Välkommen till denna prova på klass i Frigörande dans på temat ”Välkommen hem”! 🌲
    
    Denna form av meditation i rörelse är ett fint sätt att jobba både med fysiska spänningar i kroppen och hitta lugnet i tillvaron. 😌
    
    Vi dansar barfota i mjuka kläder. Ta gärna med en matta, filt eller varm tröja till den avslutande avslappningen. 🧘🏻‍♀️
    
    Hoppas att vi ses! 💕

  title: Helansiktsmålning
  date: '2026-07-29'
  start: '10:00'
  end: '12:00'
  location: Tält1
  responsible: Christina Falk
  description: |
    Vi prövar att ansiktsmåla med motiv där hela ansiktet täcks, t.ex. en tiger, spindelmannen, en solnedgång med palmer eller vad man känner sig inspirerad av.
    
    - Vi går igenom grundläggande tekniker och målar sedan på varandra 2 och 2. 
    - Var beredd på att även bli målad (eller ta med dig någon att måla på).
    - Ta med mobiltelefon om du vill måla efter förlaga.
    
    Rekommenderad ålder från 8 år. Yngre går bra om man har med en vuxen. Tålamod att slutföra är en önskvärd egenskap.
    
    Färgerna är ansiktsfärger som inte ska ge allergiska reaktioner, men de är lätt parfymerade så eventuellt ska man undvika om man är väldigt känslig.
    Färgerna tvättas av med vatten och två efteråt. Vid färg på kläder rekommenderas tvätt så fort som möjligt efter.
